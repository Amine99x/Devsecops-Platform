apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform-prod
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Rollout
      name: frontend
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: 192.168.216.130/library/mon-frontend:vPROD
    target:
      kind: Rollout
      name: frontend
