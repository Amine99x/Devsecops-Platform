apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "192.168.216.130/library/*"
          verifyDigest: false
          required: true
          mutateDigest: true
          attestors:
            - entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE2GqaI8RR43JhNnyGq+DT+926AsNn
                      Nro3jmpMQENTbftFBAM8ct+cXZCHFKRjEIwfCDQAAM9YMyQXOClMMrsfVA==
                      -----END PUBLIC KEY-----
